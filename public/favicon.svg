<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0E17"/>
      <stop offset="100%" style="stop-color:#111827"/>
    </linearGradient>
    <linearGradient id="eye" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60A5FA"/>
      <stop offset="100%" style="stop-color:#3B82F6"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Lynx eye shape -->
  <ellipse cx="256" cy="256" rx="140" ry="80" fill="none" stroke="url(#eye)" stroke-width="12"/>
  <!-- Pupil -->
  <ellipse cx="256" cy="256" rx="40" ry="60" fill="url(#eye)"/>
  <!-- Inner highlight -->
  <ellipse cx="244" cy="240" rx="12" ry="16" fill="#DBEAFE" opacity="0.8"/>
  <!-- Pointed corners (lynx eye tips) -->
  <line x1="108" y1="256" x2="70" y2="220" stroke="url(#eye)" stroke-width="10" stroke-linecap="round"/>
  <line x1="404" y1="256" x2="442" y2="220" stroke="url(#eye)" stroke-width="10" stroke-linecap="round"/>
</svg>
