<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080C14"/>
      <stop offset="100%" style="stop-color:#0F172A"/>
    </linearGradient>
    <linearGradient id="eyeBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5BA8D9"/>
      <stop offset="100%" style="stop-color:#2B7BBF"/>
    </linearGradient>
    <linearGradient id="irisGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6DBE45"/>
      <stop offset="100%" style="stop-color:#3D8B2F"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Crosshair reticle -->
  <circle cx="256" cy="240" r="110" fill="none" stroke="#2B7BBF" stroke-width="1.5" opacity="0.25"/>
  <circle cx="256" cy="240" r="70" fill="none" stroke="#2B7BBF" stroke-width="1" opacity="0.2"/>
  <line x1="256" y1="110" x2="256" y2="175" stroke="#2B7BBF" stroke-width="1.5" opacity="0.3"/>
  <line x1="256" y1="305" x2="256" y2="370" stroke="#2B7BBF" stroke-width="1.5" opacity="0.3"/>
  <line x1="126" y1="240" x2="191" y2="240" stroke="#2B7BBF" stroke-width="1.5" opacity="0.3"/>
  <line x1="321" y1="240" x2="386" y2="240" stroke="#2B7BBF" stroke-width="1.5" opacity="0.3"/>
  <!-- Outer eye shape (stylized wing) -->
  <path d="M80 240 Q170 160 256 160 Q342 160 432 240 Q342 310 256 310 Q170 310 80 240Z" fill="none" stroke="url(#eyeBlue)" stroke-width="10" stroke-linejoin="round"/>
  <!-- Upper eyelid sweep (wing tip) -->
  <path d="M80 240 Q90 195 130 170" fill="none" stroke="url(#eyeBlue)" stroke-width="8" stroke-linecap="round"/>
  <path d="M432 240 Q422 195 382 170" fill="none" stroke="url(#eyeBlue)" stroke-width="8" stroke-linecap="round"/>
  <!-- Iris -->
  <ellipse cx="256" cy="240" rx="52" ry="58" fill="url(#irisGreen)"/>
  <!-- Pupil -->
  <ellipse cx="256" cy="240" rx="22" ry="30" fill="#0A1005"/>
  <!-- Highlight -->
  <ellipse cx="244" cy="226" rx="10" ry="13" fill="white" opacity="0.75"/>
  <!-- LYNX text -->
  <text x="256" y="420" text-anchor="middle" fill="#F1F5F9" font-family="sans-serif" font-weight="800" font-size="72" letter-spacing="12">LYNX</text>
</svg>
