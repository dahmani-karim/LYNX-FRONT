<!DOCTYPE html>
<html>
<head>
  <title>LYNX – PWA Icon Generator</title>
  <style>
    body { background: #111; color: #eee; font-family: system-ui; padding: 2rem; }
    canvas { border: 1px solid #333; margin: 1rem; }
    .row { display: flex; gap: 2rem; align-items: center; flex-wrap: wrap; }
    a { color: #5BA8D9; padding: 0.5rem 1rem; border: 1px solid #5BA8D9; border-radius: 6px; text-decoration: none; display: inline-block; margin-top: 0.5rem; }
  </style>
</head>
<body>
  <h1>🐆 LYNX – PWA Icon Generator</h1>
  <p>Click the download links to save each icon to <code>public/</code></p>
  <div class="row" id="icons"></div>

  <script>
    const sizes = [
      { name: 'pwa-192x192.png', size: 192 },
      { name: 'pwa-512x512.png', size: 512 },
      { name: 'apple-touch-icon.png', size: 180 },
    ];

    const svgContent = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080C14"/>
      <stop offset="100%" style="stop-color:#0F172A"/>
    </linearGradient>
    <linearGradient id="eyeBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5BA8D9"/>
      <stop offset="100%" style="stop-color:#2B7BBF"/>
    </linearGradient>
    <linearGradient id="irisGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6DBE45"/>
      <stop offset="100%" style="stop-color:#3D8B2F"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <circle cx="256" cy="230" r="120" fill="none" stroke="#2B7BBF" stroke-width="1.5" opacity="0.25"/>
  <circle cx="256" cy="230" r="75" fill="none" stroke="#2B7BBF" stroke-width="1" opacity="0.2"/>
  <line x1="256" y1="90" x2="256" y2="155" stroke="#2B7BBF" stroke-width="1.5" opacity="0.3"/>
  <line x1="256" y1="305" x2="256" y2="370" stroke="#2B7BBF" stroke-width="1.5" opacity="0.3"/>
  <line x1="116" y1="230" x2="181" y2="230" stroke="#2B7BBF" stroke-width="1.5" opacity="0.3"/>
  <line x1="331" y1="230" x2="396" y2="230" stroke="#2B7BBF" stroke-width="1.5" opacity="0.3"/>
  <path d="M80 230 Q170 150 256 150 Q342 150 432 230 Q342 300 256 300 Q170 300 80 230Z" fill="none" stroke="url(#eyeBlue)" stroke-width="10" stroke-linejoin="round"/>
  <path d="M80 230 Q90 185 130 160" fill="none" stroke="url(#eyeBlue)" stroke-width="8" stroke-linecap="round"/>
  <path d="M432 230 Q422 185 382 160" fill="none" stroke="url(#eyeBlue)" stroke-width="8" stroke-linecap="round"/>
  <ellipse cx="256" cy="230" rx="55" ry="62" fill="url(#irisGreen)"/>
  <ellipse cx="256" cy="230" rx="24" ry="32" fill="#0A1005"/>
  <ellipse cx="244" cy="216" rx="10" ry="13" fill="white" opacity="0.75"/>
  <text x="256" y="430" text-anchor="middle" fill="#F1F5F9" font-family="system-ui,sans-serif" font-weight="800" font-size="72" letter-spacing="12">LYNX</text>
</svg>`;

    const container = document.getElementById('icons');

    sizes.forEach(({ name, size }) => {
      const div = document.createElement('div');

      const canvas = document.createElement('canvas');
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');

      const img = new Image();
      const blob = new Blob([svgContent], { type: 'image/svg+xml' });
      const url = URL.createObjectURL(blob);

      img.onload = () => {
        ctx.drawImage(img, 0, 0, size, size);
        URL.revokeObjectURL(url);

        const link = document.createElement('a');
        link.download = name;
        link.href = canvas.toDataURL('image/png');
        link.textContent = `Download ${name} (${size}×${size})`;

        div.innerHTML = `<h3>${name}</h3>`;
        div.appendChild(canvas);
        div.appendChild(document.createElement('br'));
        div.appendChild(link);
      };
      img.src = url;

      container.appendChild(div);
    });
  </script>
</body>
</html>
